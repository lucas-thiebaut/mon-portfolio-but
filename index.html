<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Lucas - BUT Réseaux & Télécoms</title>
    <meta name="description" content="Portfolio étudiant en BUT Réseaux & Télécoms, design inspiré de macOS">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📁</text></svg>">
</head>
<body>
    <div class="container">
        <!-- En-tête -->
        <header class="header">
            <h1 class="title">BUT Réseaux & Télécoms</h1>
            <div class="subtitle">Portfolio de <span class="name">Lucas</span></div>
        </header>

        <!-- Cartes principales -->
        <main class="main-content">
            <div class="cards-grid">
                <!-- Carte 1ère année (active) -->
                <div class="card active" id="card-1">
                    <div class="card-icon">📁</div>
                    <h2 class="card-title">1ʳᵉ Année</h2>
                    <p class="card-desc">Cliquez pour voir les détails</p>
                </div>
                <!-- Carte 2ème année (inactive) -->
                <div class="card inactive" id="card-2">
                    <div class="card-icon">📁</div>
                    <h2 class="card-title">2ᵉ Année</h2>
                    <p class="card-desc">Bientôt disponible</p>
                </div>
                <!-- Carte 3ème année (inactive) -->
                <div class="card inactive" id="card-3">
                    <div class="card-icon">📁</div>
                    <h2 class="card-title">3ᵉ Année</h2>
                    <p class="card-desc">Bientôt disponible</p>
                </div>
            </div>

            <!-- Zone de contenu -->
            <section class="content-area" id="content-area">
                <!-- Le contenu sera inséré ici via JavaScript -->
                <div class="default-message">
                    <p>👈 Cliquez sur "1ʳᵉ Année" pour afficher les détails</p>
                </div>
            </section>
        </main>

        <!-- Pied de page -->
        <footer class="footer" role="contentinfo">
            <div class="footer-links">
                <a href="https://linkedin.com" class="footer-link" title="Profil LinkedIn (nouvel onglet)" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                    <i class="fab fa-linkedin" aria-hidden="true"></i>
                </a>
                <a href="cv.pdf" class="footer-link" title="Télécharger mon CV (PDF)" download aria-label="Télécharger le CV">
                    <i class="fas fa-file-pdf" aria-hidden="true"></i>
                </a>
            </div>
            <p class="footer-copyright">© 2026 Lucas – BUT Réseaux & Télécoms</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
